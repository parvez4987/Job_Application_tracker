<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Manrope:wght@200..800&family=Open+Sans:ital,wght@0,300..800;1,300..800&family=Outfit:wght@100..900&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: "Inter", sans-serif;
            background-color: #f8fafc;
        }
    </style>

    <script src="https://cdn.tailwindcss.com"></script>


</head>
<body class="min-h-screen p-4 md:p-10">
    <div class="max-w-5xl mx-auto">
        <h1 class="text-2xl font-bold text-slate-800 mb-6">Job Application Tracker</h1>


        <!-- dashboard menu -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-10">
            <div class="bg-white p-6 rounded-lg shadow-sm border-t-4 border-blue-500">
                <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Total</p>
                <p id="stat-total" class="text-3xl font-bold text-blue-700">0</p>
            </div>  
            <div class="bg-white p-6 rounded-lg shadow-sm border-t-4 border-emerald-500">
                <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Interview</p>
                <p id="stat-interview" class="text-3xl font-bold text-emerald-600">0</p>
            </div>
            <div class="bg-white p-6 rounded-lg shadow-sm border-t-4 border-rose-500">
                <p class="text-xs font-semibold text-slate-500 uppercase tracking-wider mb-2">Rejected</p>
                <p id="stat-rejected" class="text-3xl font-bold text-rose-600">0</p>
            </div>
        </div>

        <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-6">
            <h2 class="text-lg font-bold text-slate-800 mb-2 md:mb-0">Available Jobs</h2>
            <span id="tab-job-count" class="text-sm font-medium text-slate-500 bg-white px-3 py-1 rounded-full shadow-sm">0 Jobs</span>
        </div>
        
        <div class="flex space-x-2 border-b border-slate-200 pb-4 mb-6" id="tabs-container">
            <button class="btn btn-sm btn-primary tab-btn" data-tab="all">All</button>
            <button class="btn btn-sm btn-ghost bg-white shadow-sm tab-btn text-slate-600" data-tab="interview">Interview</button>
            <button class="btn btn-sm btn-ghost bg-white shadow-sm tab-btn text-slate-600" data-tab="rejected">Rejected</button>
        </div>


        <!-- jobs -->
        

        <div id="jobs-container" class="flex flex-col space-y-4">
            </div>

        <div id="empty-state" class="hidden flex-col items-center justify-center py-20 bg-white rounded-xl shadow-sm border border-slate-100">
            <img src="jobs.png" alt="">
            <h3 class="text-xl font-bold text-slate-800">No jobs available</h3>
            <p class="text-slate-500 mt-2">Check back soon for new job opportunities</p>
        </div>


    </div>

    <script src="script.js"></script>
</body>
</html>
